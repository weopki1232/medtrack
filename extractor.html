<!DOCTYPE html>
<html>
<head>
  <title>MedTrack — Extract Data</title>
  <style>
    body { font-family: sans-serif; background: #0f1117; color: #e2e8f0; display: flex;
           align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
    h2 { margin: 0; }
    p  { margin: 0; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
<script>
  var data = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.startsWith('mt_')) data[k] = localStorage.getItem(k);
  }
  var count = Object.keys(data).length;
  if (count === 0) {
    document.write('<h2>⚠️ No MedTrack data found in this browser</h2><p>Make sure you opened this file in the same browser you used MedTrack in.</p>');
  } else {
    var blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mt_export.json';
    document.body.appendChild(a);
    a.click();
    document.write(
      '<h2>✅ Exported ' + count + ' data keys</h2>' +
      '<p>The file <strong>mt_export.json</strong> was saved to your Downloads folder.</p>' +
      '<p>Now open the MedTrack app — it will import automatically.</p>' +
      '<p style="margin-top:8px;font-size:12px;color:#64748b">You can close this tab.</p>'
    );
  }
</script>
</body>
</html>
